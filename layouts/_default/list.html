{{ define "main" }}
<h2>{{ .Title }}</h2>

{{ if .Content }}
  <div class="content">
    {{ .Content }}
  </div>
{{ end }}

<ul class="post-list">
  {{ range .Pages }}
    <li>
      <a href="{{ .Permalink }}">{{ .Title }}</a>
      <span class="post-meta">{{ .Date.Format "2006-01-02" }}</span>
    </li>
  {{ end }}
</ul>
{{ end }}
