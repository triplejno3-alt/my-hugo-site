{{ define "main" }}
<article>
  <header>
    <h2>{{ .Title }}</h2>
    <div style="color: #666; font-size: 0.9em; margin-bottom: 20px;">
      发布于: {{ .Date.Format "2006-01-02" }}
    </div>
  </header>
  
  <div class="content" style="margin-top: 20px;">
    {{ .Content }}
  </div>
</article>
{{ end }}
